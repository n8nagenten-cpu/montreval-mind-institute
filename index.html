  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'mmi-black': '#0A0A0A',
            'mmi-surface': '#111111',
            'mmi-gold': '#C9A84C',
            'mmi-gold-dim': '#8A7350',
            'mmi-warm': '#F0ECE2',
            'mmi-secondary': '#8A8690',
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'Georgia', 'serif'],
            sans: ['Outfit', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          screens: {
            'sm': '640px',
            'md': '768px',
            'lg': '1024px',
            'xl': '1440px',
          },
        },
      },
    }
  </script>

  <style>
    /* ═══════════════════════════════════════
       CSS CUSTOM PROPERTIES & BASE
       ═══════════════════════════════════════ */
    :root {
      --mmi-black: #0A0A0A;
      --mmi-surface: #111111;
      --mmi-gold: #C9A84C;
      --mmi-gold-dim: #8A7350;
      --mmi-warm-white: #F0ECE2;
      --mmi-text-secondary: #8A8690;
      --glass-bg: rgba(18, 18, 26, 0.55);
      --glass-border: rgba(201, 168, 76, 0.2);
      --glass-blur: 24px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--mmi-black);
      color: var(--mmi-warm-white);
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--mmi-black);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: rgba(201, 168, 76, 0.3);
      color: var(--mmi-warm-white);
    }

    /* ═══════════════════════════════════════
       KEYFRAMES
       ═══════════════════════════════════════ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-32px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scanLine {
      0% { transform: translateY(-100vh); }
      100% { transform: translateY(200vh); }
    }

    @keyframes goldPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    @keyframes heroLineExpand {
      from { width: 0; }
      to { width: 64px; }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(201, 168, 76, 0.15); }
      50% { box-shadow: 0 0 40px rgba(201, 168, 76, 0.3); }
    }

    /* ═══════════════════════════════════════
       SCAN LINE OVERLAY
       ═══════════════════════════════════════ */
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(201, 168, 76, 0.06) 20%, rgba(201, 168, 76, 0.06) 80%, transparent 100%);
      z-index: 9999;
      pointer-events: none;
      animation: scanLine 8s linear infinite;
    }

    /* ═══════════════════════════════════════
       GOLD DIVIDER
       ═══════════════════════════════════════ */
    .gold-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--mmi-gold-dim) 30%, var(--mmi-gold) 50%, var(--mmi-gold-dim) 70%, transparent 100%);
      border: none;
      opacity: 0.4;
    }

    /* ═══════════════════════════════════════
       GLASS CARD
       ═══════════════════════════════════════ */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                  box-shadow 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                  border-color 0.5s ease;
    }

    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 24px rgba(201, 168, 76, 0.08);
      border-color: rgba(201, 168, 76, 0.4);
    }

    .glass-card-highlight {
      border-color: rgba(201, 168, 76, 0.45);
      box-shadow: 0 0 32px rgba(201, 168, 76, 0.1);
      animation: glowPulse 4s ease-in-out infinite;
    }

    /* ═══════════════════════════════════════
       BUTTONS
       ═══════════════════════════════════════ */
    .btn-gold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 36px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mmi-black);
      background: var(--mmi-gold);
      border: 1px solid var(--mmi-gold);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .btn-gold::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .btn-gold:hover {
      box-shadow: 0 0 32px rgba(201, 168, 76, 0.35), 0 4px 16px rgba(0, 0, 0, 0.3);
      transform: translateY(-2px);
    }

    .btn-gold:hover::after { opacity: 1; }

    .btn-gold-outline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 36px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mmi-gold);
      background: transparent;
      border: 1px solid var(--mmi-gold);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      text-decoration: none;
    }

    .btn-gold-outline:hover {
      background: var(--mmi-gold);
      color: var(--mmi-black);
      box-shadow: 0 0 24px rgba(201, 168, 76, 0.25);
      transform: translateY(-2px);
    }

    /* ═══════════════════════════════════════
       REVEAL ANIMATIONS
       ═══════════════════════════════════════ */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                  transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-left {
      opacity: 0;
      transform: translateX(-32px);
      transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                  transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .reveal-left.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* ═══════════════════════════════════════
       FAQ ACCORDION
       ═══════════════════════════════════════ */
    .faq-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                  padding 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .faq-content.open {
      max-height: 300px;
    }

    /* ═══════════════════════════════════════
       NAVIGATION
       ═══════════════════════════════════════ */
    .nav-scrolled {
      background: rgba(10, 10, 10, 0.95) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border-bottom: 1px solid rgba(201, 168, 76, 0.08);
    }

    /* ═══════════════════════════════════════
       SKIP LINK (A11Y)
       ═══════════════════════════════════════ */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--mmi-gold);
      color: var(--mmi-black);
      padding: 8px 24px;
      z-index: 10000;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      text-decoration: none;
    }

    .skip-link:focus {
      top: 8px;
    }

    /* ═══════════════════════════════════════
       FOCUS STYLES
       ═══════════════════════════════════════ */
    :focus-visible {
      outline: 2px solid var(--mmi-gold);
      outline-offset: 3px;
    }

    /* ═══════════════════════════════════════
       REDUCED MOTION
       ═══════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .scan-line { display: none; }
      .reveal, .reveal-left { opacity: 1; transform: none; }
      html { scroll-behavior: auto; }
    }

    /* ═══════════════════════════════════════
       CUSTOM SCROLLBAR
       ═══════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--mmi-black); }
    ::-webkit-scrollbar-thumb { background: var(--mmi-gold-dim); }
    ::-webkit-scrollbar-thumb:hover { background: var(--mmi-gold); }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Zum Inhalt springen</a>
  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ═══════════════════════════════════════════════════════
       HOOKS
       ═══════════════════════════════════════════════════════ */

    function useInView(options = {}) {
      const [isVisible, setIsVisible] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;

        const check = () => {
          const rect = el.getBoundingClientRect();
          return rect.top < window.innerHeight + 80;
        };

        if (check()) {
          setIsVisible(true);
          return;
        }

        // Use both IntersectionObserver and scroll listener for reliability
        let done = false;
        const markVisible = () => {
          if (!done) {
            done = true;
            setIsVisible(true);
            observer.disconnect();
            window.removeEventListener('scroll', onScroll);
          }
        };

        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) markVisible(); },
          { threshold: 0, rootMargin: '80px 0px', ...options }
        );
        observer.observe(el);

        let ticking = false;
        const onScroll = () => {
          if (!ticking && !done) {
            ticking = true;
            requestAnimationFrame(() => {
              if (check()) markVisible();
              ticking = false;
            });
          }
        };
        window.addEventListener('scroll', onScroll, { passive: true });

        return () => {
          observer.disconnect();
          window.removeEventListener('scroll', onScroll);
        };
      }, []);

      return [ref, isVisible];
    }

    function useScrolled(threshold = 50) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        let ticking = false;
        const onScroll = () => {
          if (!ticking) {
            requestAnimationFrame(() => {
              setScrolled(window.scrollY > threshold);
              ticking = false;
            });
            ticking = true;
          }
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, [threshold]);
      return scrolled;
    }

    /* ═══════════════════════════════════════════════════════
       SHADER BACKGROUND (WebGL)
       ═══════════════════════════════════════════════════════ */

    function ShaderBackground() {
      const canvasRef = useRef(null);

      const vsSource = `
        attribute vec4 aVertexPosition;
        void main() {
          gl_Position = aVertexPosition;
        }
      `;

      // Fragment shader — MMI gold/black palette
      const fsSource = `
        precision highp float;
        uniform vec2 iResolution;
        uniform float iTime;

        const float overallSpeed = 0.2;
        const float gridSmoothWidth = 0.015;
        const float axisWidth = 0.05;
        const float majorLineWidth = 0.025;
        const float minorLineWidth = 0.0125;
        const float majorLineFrequency = 5.0;
        const float minorLineFrequency = 1.0;
        const vec4 gridColor = vec4(0.5);
        const float scale = 5.0;

        // MMI gold line color
        const vec4 lineColor = vec4(0.79, 0.66, 0.30, 1.0);
        const float minLineWidth = 0.01;
        const float maxLineWidth = 0.2;
        const float lineSpeed = 1.0 * overallSpeed;
        const float lineAmplitude = 1.0;
        const float lineFrequency = 0.2;
        const float warpSpeed = 0.2 * overallSpeed;
        const float warpFrequency = 0.5;
        const float warpAmplitude = 1.0;
        const float offsetFrequency = 0.5;
        const float offsetSpeed = 1.33 * overallSpeed;
        const float minOffsetSpread = 0.6;
        const float maxOffsetSpread = 2.0;
        const int linesPerGroup = 16;

        #define drawCircle(pos, radius, coord) smoothstep(radius + gridSmoothWidth, radius, length(coord - (pos)))
        #define drawSmoothLine(pos, halfWidth, t) smoothstep(halfWidth, 0.0, abs(pos - (t)))
        #define drawCrispLine(pos, halfWidth, t) smoothstep(halfWidth + gridSmoothWidth, halfWidth, abs(pos - (t)))
        #define drawPeriodicLine(freq, width, t) drawCrispLine(freq / 2.0, width, abs(mod(t, freq) - (freq) / 2.0))

        float drawGridLines(float axis) {
          return drawCrispLine(0.0, axisWidth, axis)
                + drawPeriodicLine(majorLineFrequency, majorLineWidth, axis)
                + drawPeriodicLine(minorLineFrequency, minorLineWidth, axis);
        }

        float drawGrid(vec2 space) {
          return min(1.0, drawGridLines(space.x) + drawGridLines(space.y));
        }

        float random(float t) {
          return (cos(t) + cos(t * 1.3 + 1.3) + cos(t * 1.4 + 1.4)) / 3.0;
        }

        float getPlasmaY(float x, float horizontalFade, float offset) {
          return random(x * lineFrequency + iTime * lineSpeed) * horizontalFade * lineAmplitude + offset;
        }

        void main() {
          vec2 fragCoord = gl_FragCoord.xy;
          vec4 fragColor;
          vec2 uv = fragCoord.xy / iResolution.xy;
          vec2 space = (fragCoord - iResolution.xy / 2.0) / iResolution.x * 2.0 * scale;

          float horizontalFade = 1.0 - (cos(uv.x * 6.28) * 0.5 + 0.5);
          float verticalFade = 1.0 - (cos(uv.y * 6.28) * 0.5 + 0.5);

          space.y += random(space.x * warpFrequency + iTime * warpSpeed) * warpAmplitude * (0.5 + horizontalFade);
          space.x += random(space.y * warpFrequency + iTime * warpSpeed + 2.0) * warpAmplitude * horizontalFade;

          vec4 lines = vec4(0.0);

          // MMI dark background gradient
          vec4 bgColor1 = vec4(0.039, 0.039, 0.039, 1.0);
          vec4 bgColor2 = vec4(0.055, 0.050, 0.042, 1.0);

          for(int l = 0; l < linesPerGroup; l++) {
            float normalizedLineIndex = float(l) / float(linesPerGroup);
            float offsetTime = iTime * offsetSpeed;
            float offsetPosition = float(l) + space.x * offsetFrequency;
            float rand = random(offsetPosition + offsetTime) * 0.5 + 0.5;
            float halfWidth = mix(minLineWidth, maxLineWidth, rand * horizontalFade) / 2.0;
            float offset = random(offsetPosition + offsetTime * (1.0 + normalizedLineIndex)) * mix(minOffsetSpread, maxOffsetSpread, horizontalFade);
            float linePosition = getPlasmaY(space.x, horizontalFade, offset);
            float line = drawSmoothLine(linePosition, halfWidth, space.y) / 2.0 + drawCrispLine(linePosition, halfWidth * 0.15, space.y);
            float circleX = mod(float(l) + iTime * lineSpeed, 25.0) - 12.0;
            vec2 circlePosition = vec2(circleX, getPlasmaY(circleX, horizontalFade, offset));
            float circle = drawCircle(circlePosition, 0.01, space) * 4.0;
            line = line + circle;
            lines += line * lineColor * rand;
          }

          fragColor = mix(bgColor1, bgColor2, uv.x);
          fragColor *= verticalFade;
          fragColor.a = 1.0;
          // Subtler line intensity for MMI aesthetic
          fragColor += lines * 0.45;
          gl_FragColor = fragColor;
        }
      `;

      const loadShader = (gl, type, source) => {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error('Shader compile error:', gl.getShaderInfoLog(shader));
          gl.deleteShader(shader);
          return null;
        }
        return shader;
      };

      const initShaderProgram = (gl, vs, fs) => {
        const vertexShader = loadShader(gl, gl.VERTEX_SHADER, vs);
        const fragmentShader = loadShader(gl, gl.FRAGMENT_SHADER, fs);
        if (!vertexShader || !fragmentShader) return null;
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          console.error('Shader link error:', gl.getProgramInfoLog(program));
          return null;
        }
        return program;
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const gl = canvas.getContext('webgl');
        if (!gl) {
          console.warn('WebGL not supported');
          return;
        }

        const shaderProgram = initShaderProgram(gl, vsSource, fsSource);
        if (!shaderProgram) return;

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
          -1, -1, 1, -1, -1, 1, 1, 1,
        ]), gl.STATIC_DRAW);

        const programInfo = {
          program: shaderProgram,
          attribLocations: {
            vertexPosition: gl.getAttribLocation(shaderProgram, 'aVertexPosition'),
          },
          uniformLocations: {
            resolution: gl.getUniformLocation(shaderProgram, 'iResolution'),
            time: gl.getUniformLocation(shaderProgram, 'iTime'),
          },
        };

        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          gl.viewport(0, 0, canvas.width, canvas.height);
        };
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let animId;
        const startTime = Date.now();

        const render = () => {
          const t = (Date.now() - startTime) / 1000;
          gl.clearColor(0, 0, 0, 1);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.useProgram(programInfo.program);
          gl.uniform2f(programInfo.uniformLocations.resolution, canvas.width, canvas.height);
          gl.uniform1f(programInfo.uniformLocations.time, t);
          gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
          gl.vertexAttribPointer(programInfo.attribLocations.vertexPosition, 2, gl.FLOAT, false, 0, 0);
          gl.enableVertexAttribArray(programInfo.attribLocations.vertexPosition);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          animId = requestAnimationFrame(render);
        };

        animId = requestAnimationFrame(render);

        return () => {
          cancelAnimationFrame(animId);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, []);

      return (
        <canvas
          ref={canvasRef}
          style={{
            position: 'fixed',
            top: 0,
            left: 0,
            width: '100%',
            height: '100%',
            zIndex: 0,
            pointerEvents: 'none',
          }}
          aria-hidden="true"
        />
      );
    }

    /* ═══════════════════════════════════════════════════════
       SCAN LINE
       ═══════════════════════════════════════════════════════ */

    function ScanLine() {
      return <div className="scan-line" aria-hidden="true" />;
    }

    /* ═══════════════════════════════════════════════════════
       GOLD DIVIDER
       ═══════════════════════════════════════════════════════ */

    function GoldDivider({ className = '' }) {
      return <hr className={`gold-divider ${className}`} aria-hidden="true" />;
    }

    /* ═══════════════════════════════════════════════════════
       SECTION LABEL
       ═══════════════════════════════════════════════════════ */

    function SectionLabel({ children }) {
      return (
        <span className="font-mono text-xs tracking-[0.2em] text-mmi-gold uppercase block mb-6">
          {children}
        </span>
      );
    }

    /* ═══════════════════════════════════════════════════════
       ANIMATED SECTION WRAPPER
       ═══════════════════════════════════════════════════════ */

    function AnimatedSection({ children, className = '', delay = 0 }) {
      const [ref, isVisible] = useInView();
      return (
        <div
          ref={ref}
          className={`reveal ${isVisible ? 'visible' : ''} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    }

    function AnimatedLeft({ children, className = '', delay = 0 }) {
      const [ref, isVisible] = useInView();
      return (
        <div
          ref={ref}
          className={`reveal-left ${isVisible ? 'visible' : ''} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       SVG ICONS (inline, no external lib)
       ═══════════════════════════════════════════════════════ */

    function IconHexagon({ className = 'w-8 h-8' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="square" strokeLinejoin="miter">
          <path d="M12 2 L21.5 7.5 L21.5 16.5 L12 22 L2.5 16.5 L2.5 7.5 Z" />
        </svg>
      );
    }

    function IconTriangle({ className = 'w-8 h-8' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="square" strokeLinejoin="miter">
          <path d="M12 3 L22 21 L2 21 Z" />
        </svg>
      );
    }

    function IconDiamond({ className = 'w-8 h-8' }) {

            <AnimatedSection delay={100}>
              <h2 className="font-serif text-2xl sm:text-3xl md:text-4xl font-medium text-mmi-warm leading-[1.3] mb-16">

              </h2>
            </AnimatedSection>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 lg:gap-12 relative">

              {steps.map((s, i) => (
                <AnimatedSection key={i} delay={200 + i * 200}>
                  <div className="relative">
                    <span className="font-mono text-5xl sm:text-6xl lg:text-7xl font-bold text-mmi-gold opacity-15 block mb-4 leading-none">

                    <p className="font-sans text-sm sm:text-base text-mmi-secondary leading-relaxed">{s.text}</p>
                  </div>
                </AnimatedSection>
              ))}
            </div>
          </div>
        </section>
      );
    }
